<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="40" fill="#0F172A"/>
  
  <!-- Main pole -->
  <rect x="85" y="90" width="10" height="62" rx="2" fill="#6B7280"/>
  
  <!-- Base -->
  <rect x="68" y="152" width="44" height="6" rx="2" fill="#6B7280"/>
  
  <!-- Light housing -->
  <rect x="42" y="18" width="96" height="72" rx="10" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  
  <!-- Top left red light -->
  <circle cx="66" cy="42" r="15" fill="#111" stroke="#475569" stroke-width="1.5"/>
  <circle cx="66" cy="42" r="11.5" fill="#DC2626"/>
  <circle cx="66" cy="42" r="18" fill="#DC2626" opacity="0.12"/>
  
  <!-- Top right red light (dimmed) -->
  <circle cx="114" cy="42" r="15" fill="#111" stroke="#475569" stroke-width="1.5"/>
  <circle cx="114" cy="42" r="11.5" fill="#DC2626" opacity="0.3"/>
  
  <!-- Bottom centre amber light -->
  <circle cx="90" cy="72" r="15" fill="#111" stroke="#475569" stroke-width="1.5"/>
  <circle cx="90" cy="72" r="11.5" fill="#F59E0B" opacity="0.35"/>
</svg>
